version: '3.9'

services:
  postgredb:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ToDoApp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgredb:5432/mydatabase
    depends_on:
      - postgredb
    ports:
      - "4000:4000"

volumes:
  pgdata:
