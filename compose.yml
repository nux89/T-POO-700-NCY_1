version: '3.9'

services:
  postgredb:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pointage
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./Api
      dockerfile: Dockerfile
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: pointage
      PGPORT: 5432
      PGHOST: postgredb
    depends_on:
      - postgredb
    ports:
      - "4002:4002"

  front: 
    build:
      context: ./front
      dockerfile: Dockerfile
    depends_on: 
      - api
    ports:
    - "8000:8000"



volumes:
  pgdata:
